# Template konfigurasi agent untuk disebar ke PC siswa.
# Salin menjadi agent.yaml di samping agent.exe.
#
# server_host: "auto" (default) => agent MENEMUKAN server otomatis di LAN lewat
#   UDP broadcast. Cukup install, tidak perlu tahu IP/port server sama sekali.
#   Isi dengan IP server HANYA bila server & PC siswa berada di subnet/jaringan
#   berbeda sehingga broadcast tidak menjangkau (mis. "192.168.1.10").
#
# device_id & device_token DIBIARKAN KOSONG — server akan mengisinya otomatis
# saat agent pertama kali registrasi, lalu tersimpan ke file ini.

agent:
  server_host: "auto"           # "auto" = temukan server sendiri di jaringan
  server_port: 7000
  use_tls: false                # true bila server memakai HTTPS/WSS
  device_id: ""
  device_token: ""
  reconnect_seconds: 5
  heartbeat_seconds: 5

logging:
  level: "info"
  max_size_mb: 50
  max_backups: 5
  max_age_days: 30
