<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Remote PC</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">Remote<span>PC</span> · Dashboard PC</div>
    <div class="actions">
      <button class="btn" onclick="location.href='/hp'">📱 HP Siswa</button>
      <button class="btn" onclick="location.href='/version'">ℹ️ Versi</button>
      <span id="whoami" class="muted"></span>
      <button class="btn" onclick="logout()">Keluar</button>
    </div>
  </nav>

  <div class="container">
    <div class="cards">
      <div class="card"><div class="label">Total Device</div><div class="value" id="stat-total">0</div></div>
      <div class="card"><div class="label">Online</div><div class="value online" id="stat-online">0</div></div>
      <div class="card"><div class="label">Offline</div><div class="value offline" id="stat-offline">0</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>Perangkat</span>
        <span class="actions">
          <button class="btn" onclick="messageAll()" title="Kirim pesan ke semua PC online">💬 Pesan Semua</button>
          <button class="btn" onclick="powerAll('restart')" title="Restart semua PC online">⟳ Restart Semua</button>
          <button class="btn btn-danger" onclick="powerAll('shutdown')" title="Matikan semua PC online">⏻ Shutdown Semua</button>
          <span class="muted" id="refresh-note" style="font-size:0.8rem">memuat…</span>
        </span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Hostname</th><th>User</th><th>IP</th><th>Windows</th>
              <th>CPU</th><th>RAM</th><th>Status</th><th>Terakhir</th><th class="text-end">Aksi</th>
            </tr>
          </thead>
          <tbody id="device-rows">
            <tr><td colspan="9" class="soon">Belum ada perangkat.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
