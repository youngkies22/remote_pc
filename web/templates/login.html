<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Remote PC</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="login-wrap">
    <form id="loginForm" class="login-card">
      <h1>Remote<span style="color:var(--accent)">PC</span></h1>
      <p>Masuk ke dashboard monitoring &amp; management</p>
      <div id="error" class="alert error"></div>
      <div class="form-group">
        <label for="username">Username</label>
        <input class="form-control" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">Masuk</button>
    </form>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
